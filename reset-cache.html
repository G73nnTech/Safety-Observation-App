<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Refreshing Safety Observation</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7f6;
        color: #17201d;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 420px);
        padding: 24px;
        background: #ffffff;
        border: 1px solid #d8e1de;
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(20, 36, 32, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: #66736e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Refreshing app</h1>
      <p>Clearing the old preview cache and loading the newest version.</p>
    </main>
    <script>
      async function resetCache() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        window.location.replace("./?fresh=" + Date.now());
      }

      resetCache();
    </script>
  </body>
</html>
